# Apollo 配置文件 - order-service
# 将此文件内容复制到 Apollo 配置中心的 order-service 应用中

# ========== 服务器配置 ==========
server.port=9010

# ========== Spring 应用配置 ==========
spring.application.name=order-service
spring.main.allow-bean-definition-overriding=true

# ========== ShardingSphere 数据源配置 ==========
spring.shardingsphere.datasource.names=ds0
spring.shardingsphere.datasource.ds0.type=com.alibaba.druid.pool.DruidDataSource
spring.shardingsphere.datasource.ds0.driver-class-name=com.mysql.cj.jdbc.Driver
spring.shardingsphere.datasource.ds0.url=jdbc:mysql://localhost:3306/order_db?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
spring.shardingsphere.datasource.ds0.username=root
spring.shardingsphere.datasource.ds0.password=12345678
spring.shardingsphere.datasource.ds0.initial-size=5
spring.shardingsphere.datasource.ds0.min-idle=5
spring.shardingsphere.datasource.ds0.max-active=20
spring.shardingsphere.datasource.ds0.max-wait=60000

# ========== ShardingSphere 分片规则 ==========
spring.shardingsphere.props.sql-show=true
spring.shardingsphere.rules.sharding.binding-tables=t_order,t_order_item

# ========== ShardingSphere 表分片配置 ==========
# t_order 表分片配置
spring.shardingsphere.rules.sharding.tables.t_order.actual-data-nodes=ds0.t_order_$->{202601..202612},ds0.t_order
spring.shardingsphere.rules.sharding.tables.t_order.table-strategy.standard.sharding-column=code
spring.shardingsphere.rules.sharding.tables.t_order.table-strategy.standard.sharding-algorithm-name=order-month-sharding

# t_order_item 表分片配置
spring.shardingsphere.rules.sharding.tables.t_order_item.actual-data-nodes=ds0.t_order_item_$->{202601..202612},ds0.t_order_item
spring.shardingsphere.rules.sharding.tables.t_order_item.table-strategy.standard.sharding-column=code
spring.shardingsphere.rules.sharding.tables.t_order_item.table-strategy.standard.sharding-algorithm-name=order-item-month-sharding

# t_region 表配置（不分片）
spring.shardingsphere.rules.sharding.tables.t_region.actual-data-nodes=ds0.t_region

# t_user 表配置（不分片）
spring.shardingsphere.rules.sharding.tables.t_user.actual-data-nodes=ds0.t_user

# ========== ShardingSphere 分片算法 ==========
# order-month-sharding 算法
spring.shardingsphere.rules.sharding.sharding-algorithms.order-month-sharding.type=CLASS_BASED
spring.shardingsphere.rules.sharding.sharding-algorithms.order-month-sharding.props.strategy=STANDARD
spring.shardingsphere.rules.sharding.sharding-algorithms.order-month-sharding.props.algorithmClassName=com.zf.sharding.OrderShardingAlgorithm

# order-item-month-sharding 算法
spring.shardingsphere.rules.sharding.sharding-algorithms.order-item-month-sharding.type=CLASS_BASED
spring.shardingsphere.rules.sharding.sharding-algorithms.order-item-month-sharding.props.strategy=STANDARD
spring.shardingsphere.rules.sharding.sharding-algorithms.order-item-month-sharding.props.algorithmClassName=com.zf.sharding.OrderItemShardingAlgorithm

# ========== RocketMQ 配置 ==========
rocketmq.name-server=localhost:9876
rocketmq.producer.group=order-producer-group
rocketmq.producer.send-message-timeout=6000
rocketmq.producer.retry-times-when-send-failed=2
rocketmq.producer.max-message-size=4194304
rocketmq.consumer.group=order-consumer-group

# ========== Eureka 配置 ==========
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${server.port}

# ========== MyBatis 配置 ==========
mybatis.type-aliases-package=com.zf.entity
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl