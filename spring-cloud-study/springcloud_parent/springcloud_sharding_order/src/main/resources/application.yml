# ========== 本地配置文件 ==========
# 注意：此文件用于本地开发或作为默认配置
# 生产环境请使用 Apollo 配置中心进行配置管理
# Apollo 配置优先级高于本地配置

# 服务器配置
server:
  port: 9010

spring:
