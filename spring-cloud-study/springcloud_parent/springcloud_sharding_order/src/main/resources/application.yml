# ========== 本地配置文件 ==========
# 注意：此文件用于本地开发或作为默认配置
# 生产环境请使用 Apollo 配置中心进行配置管理
# Apollo 配置优先级高于本地配置

# 服务器配置
server:
  port: 9010

spring:
  application:
    name: order-service
  
  main:
    allow-bean-definition-overriding: true
  
  # 禁用数据源初始化，避免循环依赖
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
  
  # 数据源配置
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/order_db?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=UTC
    username: root
    password: 12345678
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      validation-query: SELECT 1
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      filters: stat,wall,log4j2
      web-stat-filter:
        enabled: true
        url-pattern: /*
      stat-view-servlet:
        enabled: true
        url-pattern: /druid/*
        reset-enable: false

# RocketMQ 配置
rocketmq:
  name-server: 127.0.0.1:9876
  producer:
    group: order-producer-group
    send-message-timeout: 10000
    retry-times-when-send-failed: 2
    retry-times-when-send-async-failed: 2
  consumer:
    group: order-consumer-group-local

# Eureka 配置
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}

# MyBatis 配置
mybatis:
  type-aliases-package: com.zf.entity
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# 数据源路由配置
datasource-router:
  # 写入模式：old/new/both
  # - old: 只写老表
  # - new: 只写新表（分片表）
  # - both: 双写（老表和新表都写）
  write-mode: old
  
  # 读取模式：old/new
  # - old: 只读老表
  # - new: 只读新表（分片表）
  read-mode: old
  
  # 双写顺序（当write-mode=both时生效）
  # - old-first: 先写老表，再写新表
  # - new-first: 先写新表，再写老表
  dual-write-order: old-first

# 分片功能开关
sharding:
  enabled: false

